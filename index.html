<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live the Faith</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
      scroll-behavior: smooth;
    }

    body {
      background-color: #f8fafc;
      color: #333;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      background-color: #2e2e2e;
      padding: 12px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #facc15;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }

    nav a:hover {
      color: #facc15;
    }

    .hero {
      height: 80vh;
      background: linear-gradient(rgba(15,23,42,0.75), rgba(15,23,42,0.75)),
      url('https://images.unsplash.com/photo-1509021436665-8f07dbf5bf1d');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      margin-top: 60px;
    }

    .hero h2 {
      font-size: 3em;
      margin-bottom: 20px;
    }

    .btn {
      background-color: #facc15;
      padding: 12px 30px;
      border-radius: 50px;
      text-decoration: none;
      color: #000;
      font-weight: bold;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin: 40px;
    }

    .product-card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      overflow: hidden;
      text-align: center;
      transition: 0.3s;
    }

    .product-card:hover {
      transform: translateY(-8px);
    }

    .product-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .price {
      color: #4CAF50;
      font-weight: bold;
      margin: 10px 0;
    }

    .product-card button {
      background-color: #f39c12;
      color: white;
      padding: 10px;
      width: 100%;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
    }

    /* ===== LOGIN NOVO DESIGN ===== */
    .login-box {
      background: #fff;
      width: 320px;
      padding: 30px;
      border-radius: 14px;
      text-align: center;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .login-box h2 {
      margin-bottom: 20px;
    }

    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
    }

    .login-box button {
      width: 100%;
      padding: 12px;
      background: #facc15;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .login-box button:hover {
      background: #e6b800;
    }

    .cadastro-texto {
      font-size: 13px;
      margin: 10px 0;
    }

    .cadastro-texto a {
      color: #facc15;
      text-decoration: none;
      font-weight: 600;
    }

    .fechar {
      position: absolute;
      right: 15px;
      top: 10px;
      font-size: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h1 class="logo">Live the Faith</h1>
  <nav>
    <a href="#">Início</a>
    <a href="#produtos">Produtos</a>
    <a href="#">Contato</a>
    <a href="#" onclick="abrirLogin()">Login</a>
  </nav>
</header>

<section class="hero">
  <h2>Vista sua fé ✨</h2>
  <a href="#produtos" class="btn">Explorar coleção</a>
</section>

<section id="produtos" class="products">

  <div class="product-card">
    <img src="camisaltf.png">
    <h3>Camisa Live the Faith</h3>
    <p>Fé que ilumina, amor que transforma.</p>
    <div class="price">R$90,00</div>
    <button onclick="verificarCompra('Camisa Live the Faith','R$90,00','camisaltf.png')">Comprar</button>
  </div>

</section>

<!-- MODAL COMPRA -->
<div id="compraModal" class="modal">
  <div class="modal-content">
    <span class="fechar" onclick="fecharCompra()">&times;</span>

    <h2 id="nomeProduto"></h2>
    <img id="imgProduto" style="width:100%; border-radius:10px; margin:10px 0;">
    <p id="precoProduto" style="color:green; font-weight:bold;"></p>

    <button onclick="alert('Compra finalizada!')">Finalizar compra</button>
  </div>
</div>

<!-- 🔥 LOGIN MODAL (SÓ ESTA PARTE FOI MUDADA) -->
<div id="loginModal" class="modal">
  <div class="login-box">

    <span class="fechar" onclick="fecharLogin()">&times;</span>

    <h2>Entrar</h2>

    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="senha" placeholder="Senha">

    <p class="cadastro-texto">
      Não tem uma conta? <a href="cadastrar.php">Cadastre-se</a>
    </p>

    <button onclick="simularLogin()">Entrar</button>

  </div>
</div>

<script>

let usuarioLogado = false;

function verificarCompra(nome, preco, img) {
  if(!usuarioLogado){
    abrirLogin();
    return;
  }
  abrirCompra(nome, preco, img);
}

function abrirCompra(nome, preco, img) {
  document.getElementById("compraModal").style.display = "flex";
  document.getElementById("nomeProduto").innerText = nome;
  document.getElementById("precoProduto").innerText = preco;
  document.getElementById("imgProduto").src = img;
}

function fecharCompra() {
  document.getElementById("compraModal").style.display = "none";
}

function abrirLogin() {
  document.getElementById("loginModal").style.display = "flex";
}

function fecharLogin() {
  document.getElementById("loginModal").style.display = "none";
}

function simularLogin() {
  usuarioLogado = true;
  fecharLogin();
  alert("Login realizado com sucesso!");
}

window.onclick = function(e) {
  if (e.target.classList.contains("modal")) {
    e.target.style.display = "none";
  }
}

</script>

</body>
</html>
