<!DOCTYPE html> 
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Live the Faith</title>

<link href="https://fonts.googleapis.com/css2?family=Herr+Von+Muellerhoff&family=Merriweather:wght@400;700&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

  @font-face {
    font-family: 'Faith';
    src: url(fontefaith.zip) format('truetype');
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  /* 🌟 FONTE GLOBAL ATUALIZADA PARA CORPO DE TEXTO */
  font-family: 'Open Sans', sans-serif;
  scroll-behavior: smooth;
}

body {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'fontefaith', sans-serif;
  scroll-behavior: smooth;
  background-image: url('image_2.png'); /* Usa o nome do arquivo gerado verbatim */
  background-size: cover;         
  background-position: center;    
  background-attachment: fixed;   
  background-repeat: no-repeat;
  color: #333;
}

header {
  position: fixed;
  top: 0;
  width: 100%;
  background-color: #2e2e2e;
  padding: 12px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
  gap: 15px;
}

.logo {
  font-size: 34px; /* 🌟 Aumentado um pouco para a script */
  /* 🌟 FONTE ATUALIZADA PARA O ESTILO CALIGRÁFICO NO LOGOTIPO */
  font-family: 'Herr Von Muellerhoff', cursive;
  font-weight: 400;
  color: #facc15;
  white-space: nowrap;
}

.search-box {
  flex-grow: 1;
  max-width: 400px;
  position: relative;
  display: flex;
  align-items: center;
}

.search-box input {
  width: 100%;
  padding: 8px 15px;
  border-radius: 20px;
  border: none;
  outline: none;
  font-size: 14px;
}

.menu-toggle {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
}

.menu-toggle span {
  width: 25px;
  height: 3px;
  background-color: white;
  border-radius: 2px;
}

nav {
  display: flex;
  align-items: center;
  gap: 20px;
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: 600;
  font-size: 14px;
}

nav a:hover {
  color: #facc15;
}

.user-menu {
  position: relative;
  display: flex;
  align-items: center;
  cursor: pointer;
}

.user-icon {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #2e2e2e;
  font-weight: bold;
  font-size: 14px;
  transition: 0.3s;
}

.user-icon:hover {
  transform: scale(1.05);
}

.dropdown {
  position: absolute;
  top: 50px;
  right: 0;
  background: white;
  border-radius: 10px;
  width: 180px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  opacity: 0;
  visibility: hidden;
  transform: translateY(10px);
  transition: 0.3s;
}

.user-menu:hover .dropdown {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

.dropdown a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  text-decoration: none;
  color: #333;
  font-size: 14px;
}

.dropdown a:hover {
  background: #f3f4f6;
}

@media (max-width: 850px) {
  header { padding: 12px 20px; }
  .menu-toggle { display: flex; }
  
  nav {
    display: none;
    flex-direction: column;
    position: absolute;
    top: 60px;
    left: 0;
    width: 100%;
    background-color: #2e2e2e;
    padding: 20px;
    gap: 15px;
    box-shadow: 0 10px 15px rgba(0,0,0,0.2);
  }

  nav.active {
    display: flex;
  }

 .hero h2{
    font-size:2.8rem !important;
    top:25px !important;
    left:25px !important;
}

.faith-text{
    font-size:6rem !important;
}
}

.hero {
  height: 80vh;
  background: linear-gradient(rgba(15,23,42,0.75), rgba(15,23,42,0.75)),
  url('fundo.png');
  background-size: cover;
  background-position: center;
  display: flex;
  flex-direction: column;
  color: white;
  margin-top: 60px;
  position: relative; /* Permite o posicionamento absoluto do h2 baseado nos limites do hero */
}

.hero h2{
    position:absolute;
    top:50px;
    left:60px;

    display:flex;
    flex-direction:column;

    color:white;

    font-family:'Faith', serif;
    font-size:4.5rem;
    font-weight:700;
    line-height:0.9;

    text-shadow:
        0 4px 15px rgba(0,0,0,.4),
        0 8px 30px rgba(0,0,0,.5);
}

.faith-text{
    font-family:'Faith', cursive;
    font-size:10rem;
    font-weight:normal;

    color:#facc15;

    line-height:.8;

    text-shadow:
        0 0 10px rgba(250,204,21,.4),
        0 0 25px rgba(250,204,21,.3),
        0 10px 30px rgba(0,0,0,.5);
}

.faith-text {
    display: block;
    font-family: fontefaith, cursive;
    font-size: 9rem;
    font-weight: normal;
    color: #facc15;
    line-height: 0.8;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
  gap:25px;
  margin:40px;
}

.product-card{
  background: white;        
  border: 2px solid #d1d5db; 
  border-radius: 12px;       
  overflow: hidden;          
  transition: 0.3s;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 0;                    
}

.product-card:hover{
  transform: translateY(-5px);
  border-color: #9ca3af; 
}

.img-container {
  position: relative;
  background: #f3f4f6;
  height: 280px;
  border: none;              
  border-radius: 0;          
  overflow: hidden;          
  display: flex;
  align-items: center;
  justify-content: center;
}

.img-container img {
  width: 100%;
  height: 100%;
  object-fit: contain; 
  object-position: center;
  padding: 15px;       
  display: none;
  position: absolute;
  top: 0;
  left: 0;
}

.img-container img.active {
  display: block;
}

.seta {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255, 255, 255, 0.8);
  border: none;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  z-index: 5;
  transition: 0.2s;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.seta:hover {
  background: rgba(255, 255, 255, 1);
}

.seta.prev { left: 8px; }
.seta.next { right: 8px; }

.fav {
  position: absolute;
  top: 10px;
  right: 10px;
  background: white;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  z-index: 5;
  font-size: 18px;
  color: #333;
  transition: 0.2s;
}

.fav:hover {
  transform: scale(1.1);
}

.product-info{
  padding: 15px;
  background: transparent;   
  border: none;              
  margin-top: 0;             
}

.product-info h3 {
  /* 🌟 FONTE ATUALIZADA PARA O TÍTULO DO PRODUTO (Subtítulo robusto) */
  font-family: 'Faith', serif;
  font-weight: 700;
  font-size: 16px;
  margin-bottom: 5px;
}

.categoria{
  color:#777;
  font-size:13px;
}

.price-box{
  margin-top:10px;
}

.price{
  font-weight:bold;
  font-size:16px;
}

.old-price{
  text-decoration:line-through;
  color:#999;
  margin-left:8px;
  font-size:14px;
}

.desconto{
  color:green;
  margin-left:8px;
  font-size:14px;
}

.modal {
  display: none;
  position: fixed;
  z-index: 2000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
}

.login-box {
  background: #fff;
  width: 320px;
  padding: 30px;
  border-radius: 14px;
  text-align: center;
  position: relative;
}

.login-box h2 {
  /* 🌟 FONTE ATUALIZADA PARA O TÍTULO DO MODAL */
  font-family: 'Faith', serif;
  font-weight: 700;
  margin-bottom: 15px;
}

.login-box input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: 1px solid #ddd;
  border-radius: 8px;
}

.login-box button {
  width: 100%;
  padding: 12px;
  background: #facc15;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.fechar {
  position: absolute;
  right: 15px;
  top: 10px;
  font-size: 20px;
  cursor: pointer;
}

.btn-login {
  background: #facc15;
  border: none;
  padding: 6px 14px;
  border-radius: 20px;
  font-weight: 600;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <div class="menu-toggle" onclick="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <h1 class="logo">Live the Faith</h1>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Pesquisar produtos..." onkeyup="filtrarProdutos()" autocomplete="off">
  </div>

  <nav id="navLinks">
    <a href="#">Início</a>
    <a href="#sobre">Sobre nós</a>
    <a href="#produtos">Produtos</a>
    <a href="#">Contato</a>
    
    <div id="areaUsuario">
      <button class="btn-login" onclick="abrirLogin()">Login</button>
    </div>
  </nav>
</header>

<section class="hero">
  <h2>
    Vista sua<br>
    <span class="faith-text">Fé</span>
  </h2>
</section>

<section id="produtos" class="products"></section>

<section id="sobre" class=""></section>

<div id="loginModal" class="modal">
  <div class="login-box">
    <span class="fechar" onclick="fecharLogin()">X</span>
    <h2>Entrar</h2>
    <input id="email" placeholder="email">
    <input id="senha" type="password" placeholder="senha">
    <p style="margin-bottom:10px; font-size:13px;">Não tem conta? <a href="#" onclick="abrirCadastro()" style="color:#facc15;">Cadastre-se</a></p>
    <p style="margin-bottom:10px; font-size:13px;">Esqueceu a senha? <a href="#" onclick="abrirRecuperarSenha()" style="color:#facc15;">Recuperar senha</a></p>
    <button onclick="simularLogin()">Entrar</button>
  </div>
</div>

<div id="cadastroModal" class="modal">
  <div class="login-box">
    <span class="fechar" onclick="fecharCadastro()">X</span>
    <h2>Criar conta</h2>
    <input id="nomeCad" placeholder="nome">
    <input id="telefoneCad" placeholder="telefone" maxlength="15">
    <input id="emailCad" placeholder="email">
    <input id="senhaCad" type="password" placeholder="senha">
    <button onclick="cadastrar()">Cadastrar</button>
  </div>
</div>

<div id="trocarSenhaModal" class="modal">
  <div class="login-box">
    <span class="fechar" onclick="fecharTrocarSenha()">X</span>
    <h2>Trocar senha</h2>
    <input id="senhaAtual" type="password" placeholder="Senha atual">
    <input id="novaSenha" type="password" placeholder="Nova senha">
    <button onclick="trocarSenha()">Atualizar senha</button>
  </div>
</div>

<div id="recuperarModal" class="modal">
  <div class="login-box">
    <span class="fechar" onclick="fecharRecuperarSenha()">X</span>
    <h2>Recuperar senha</h2>
    <input id="emailRec" placeholder="Digite seu email">
    <input id="novaSenhaRec" type="password" placeholder="Nova senha">
    <button onclick="recuperarSenha()">Atualizar senha</button>
  </div>
</div>

<script>
function criarCookie(nome, valor, dias) {
    const data = new Date();
    data.setTime(data.getTime() + (dias * 24 * 60 * 60 * 1000));
    document.cookie = `${nome}=${valor}; expires=${data.toUTCString()}; path=/`;
}

function lerCookie(nome) {
    const nomeIgual = nome + "=";
    const array = document.cookie.split(';');
    for(let i = 0; i < array.length; i++) {
        let c = array[i].trim();
        if (c.indexOf(nomeIgual) == 0) return c.substring(nomeIgual.length, c.length);
    }
    return null;
}

function toggleMenu() {
  document.getElementById("navLinks").classList.toggle("active");
}

function filtrarProdutos() {
  const termo = document.getElementById("searchInput").value.toLowerCase();
  const cards = document.querySelectorAll(".product-card");

  cards.forEach(card => {
    const nome = card.querySelector("h3").innerText.toLowerCase();
    if (nome.includes(termo)) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}

function limparBusca() {
  const searchInput = document.getElementById("searchInput");
  if (searchInput) {
    searchInput.value = "";
    filtrarProdutos();
  }
}

function limparFormularios(modalId) {
  const inputs = document.querySelectorAll(`#${modalId} input`);
  inputs.forEach(input => {
    input.value = "";
  });
}

function abrirLogin(){ 
  limparBusca();
  limparFormularios("loginModal");
  document.getElementById("loginModal").style.display = "flex"; 
}
function fecharLogin(){ 
  document.getElementById("loginModal").style.display = "none";
  limparFormularios("loginModal");
}

function abrirCadastro(){
  limparBusca();
  limparFormularios("cadastroModal");
  document.getElementById("loginModal").style.display = "none";
  document.getElementById("cadastroModal").style.display = "flex";
}
function fecharCadastro(){ 
  document.getElementById("cadastroModal").style.display = "none";
  limparFormularios("cadastroModal");
}

function abrirTrocarSenhas(){ 
  limparBusca();
  limparFormularios("trocarSenhaModal");
  document.getElementById("trocarSenhaModal").style.display = "flex"; 
}
function fecharTrocarSenha(){ 
  document.getElementById("trocarSenhaModal").style.display = "none";
  limparFormularios("trocarSenhaModal");
}

function abrirRecuperarSenha(){
  limparBusca();
  limparFormularios("recuperarModal");
  document.getElementById("loginModal").style.display = "none";
  document.getElementById("recuperarModal").style.display = "flex";
}
function fecharRecuperarSenha(){ 
  document.getElementById("recuperarModal").style.display = "none";
  limparFormularios("recuperarModal");
}

document.getElementById('telefoneCad').addEventListener('input', (e) => {
    let target = e.target;
    let valor = target.value;
    valor = valor.replace(/\D/g, ""); 
    if (valor.length > 11) {
        valor = valor.slice(0, 11); 
    }
    if (valor.length > 0) {
        valor = "(" + valor;
        if (valor.length > 3) {
            valor = valor.slice(0, 3) + ") " + valor.slice(3);
        }
        if (valor.length > 9) {
            if (valor.length > 13) {
                valor = valor.slice(0, 10) + "-" + valor.slice(10); 
            } else {
                valor = valor.slice(0, 9) + "-" + valor.slice(9);  
            }
        }
    }
    target.value = valor;
});

function cadastrar(){
  const nome=document.getElementById("nomeCad").value;
  const telefone=document.getElementById("telefoneCad").value;
  const email=document.getElementById("emailCad").value;
  const senha=document.getElementById("senhaCad").value;

  fetch("cadastrar.php",{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:`nome=${nome}&telefone=${telefone}&email=${email}&senha=${senha}`
  })
  .then(r=>r.json())
  .then(data=>{
    if(data.status==="ok"){
      alert("Cadastro realizado com sucesso!");
      fecharCadastro();
      abrirLogin();
    }else{
      alert(data.mensagem);
    }
  });
}

function trocarSenha(){
  const senhaAtual=document.getElementById("senhaAtual").value;
  const novaSenha=document.getElementById("novaSenha").value;

  fetch("trocar_senha.php",{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:`senhaAtual=${senhaAtual}&novaSenha=${novaSenha}`
  })
  .then(r=>r.json())
  .then(data=>{
    if(data.status==="ok"){
      alert("Senha atualizada com sucesso!");
      fecharTrocarSenha();
    }else{
      alert(data.mensagem);
    }
  });
}

function recuperarSenha(){
  const email=document.getElementById("emailRec").value;
  const novaSenha=document.getElementById("novaSenhaRec").value;

  fetch("trocar_senha.php",{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:`email=${email}&novaSenha=${novaSenha}`
  })
  .then(r=>r.json())
  .then(data=>{
    if(data.status==="ok"){
      alert("Senha updated com sucesso!");
      fecharRecuperarSenha();
      abrirLogin();
    }else{
      alert(data.mensagem);
    }
  });
}

function simularLogin(){
  const email=document.getElementById("email").value;
  const senha=document.getElementById("senha").value;

  fetch("login.php",{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:`email=${email}&senha=${senha}`
  })
  .then(r=>r.json())
  .then(data=>{
    if(data.status==="ok"){
      localStorage.setItem("usuarioId", data.id);
      localStorage.setItem("usuarioNome", data.nome);
      criarCookie("usuario_logado", data.nome, 7);
      criarCookie("usuario_id", data.id, 7);

      fecharLogin();

      if(data.admin == 1 || data.admin == "1"){
        localStorage.setItem("usuarioAdmin", "1");
        criarCookie("usuario_admin", "1", 7);
        window.location.href="admin.html";
        return;
      }

      localStorage.setItem("usuarioAdmin", "0");
      criarCookie("usuario_admin", "0", 7);

      document.getElementById("areaUsuario").innerHTML = `
        <div class="user-menu">
          <div class="user-icon">
            ${data.nome.charAt(0).toUpperCase()}
          </div>
          <div class="dropdown">
            <a href="carrinho.html">🛒 Carrinho</a>
            <a href="favoritos.html">❤️ Favoritos</a>
            <a href="#" onclick="logout()">🚪 Sair</a>
          </div>
        </div>
      `;
    }else{
      alert(data.mensagem);
    }
  });
}

function logout(){
  localStorage.removeItem("usuarioId");
  localStorage.removeItem("usuarioNome");
  localStorage.removeItem("usuarioAdmin");
  
  document.cookie = "usuario_logado=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
  document.cookie = "usuario_id=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
  document.cookie = "usuario_admin=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
  
  limparBusca();
  location.reload();
}

window.onload=()=>{
  limparBusca();
  carregarProdutos();

  const userCookie = lerCookie("usuario_logado");
  const adminCookie = lerCookie("usuario_admin");

  if(userCookie){
      if(adminCookie === "1"){
          document.getElementById("areaUsuario").innerHTML = `
            <div class="user-menu">
              <div class="user-icon">
                ${userCookie.charAt(0).toUpperCase()}
              </div>
              <div class="dropdown">
                <a href="admin.html">📦 Cadastrar Produtos</a>
                <a href="#" onclick="logout()">🚪 Sair</a>
              </div>
            </div>
          `;
      } else {
          document.getElementById("areaUsuario").innerHTML = `
            <div class="user-menu">
              <div class="user-icon">
                ${userCookie.charAt(0).toUpperCase()}
              </div>
              <div class="dropdown">
                <a href="perfil.html">👤 Meu Perfil</a>
                <a href="carrinho.html">🛒 Carrinho</a>
                <a href="favoritos.html">❤️ Favoritos</a>
                <a href="#" onclick="logout()">🚪 Sair</a>
              </div>
            </div>
          `;
      }
  }
}

function carregarProdutos(){
  fetch("listar.php")
  .then(r=>r.json())
  .then(produtos=>{
    let html="";
    produtos.forEach(p=>{
      html+=`
        <div class="product-card" onclick='abrirProduto(${JSON.stringify(p)})'>
          <div class="img-container">
            <img src="${p.imagem}" class="active" id="img-frente-${p.id}">
            <img src="${p.imagem_costas || p.imagem}" id="img-costas-${p.id}">
            <button class="seta prev" onclick="event.stopPropagation(); trocar(-1, ${p.id})">&#10094;</button>
            <button class="seta next" onclick="event.stopPropagation(); trocar(1, ${p.id})">&#10095;</button>
            <div class="fav" onclick="event.stopPropagation(); alternarFavorito(${p.id})">♡</div>
          </div>
          <div class="product-info">
            <h3>${p.nome}</h3>
            <span class="categoria">${p.categoria || "Casual"}</span>
            <div class="price-box">
              <span class="price">R$ ${p.preco}</span>
              ${p.preco_antigo ? `<span class="old-price">R$ ${p.preco_antigo}</span>` : ""}
              ${p.desconto ? `<span class="desconto">${p.desconto}</span>` : ""}
            </div>
          </div>
        </div>
      `;
    });
    document.getElementById("produtos").innerHTML=html;
  });
}

function abrirProduto(produto){
  localStorage.setItem("produtoSelecionado", JSON.stringify(produto));
  window.location.href = "produto.html";
}

function trocar(direcao, idProduto) {
    const imgFrente = document.getElementById("img-frente-" + idProduto);
    const imgCostas = document.getElementById("img-costas-" + idProduto);

    if (imgFrente.classList.contains("active")) {
        imgFrente.classList.remove("active");
        imgCostas.classList.add("active");
    } else {
        imgCostas.classList.remove("active");
        imgFrente.classList.add("active");
    }
}

function alternarFavorito(idProduto) {
    const idUsuario = localStorage.getItem("usuarioId");

    if (!idUsuario) {
        alert("Por favor, faça login para adicionar produtos aos seus favoritos!");
        abrirLogin();
        return;
    }

    fetch("favoritar.php", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: `id_usuario=${idUsuario}&id_produto=${idProduto}`
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === "ok") {
            alert(data.mensagem); 
        } else {
            alert(data.mensagem || "Erro ao processar sua solicitação.");
        }
    })
    .catch(err => {
        console.error("Erro na requisição:", err);
        alert("Não foi possível conectar ao servidor.");
    });
}
