<<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live the Faith</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
      scroll-behavior: smooth;
    }

    body {
      background-color: #f8fafc;
      color: #333;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      background-color: #2e2e2e;
      padding: 12px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #facc15;
      letter-spacing: 1px;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }

    nav a:hover {
      color: #facc15;
    }

    .hero {
      height: 80vh;
      background: linear-gradient(rgba(15,23,42,0.75), rgba(15,23,42,0.75)),
      url('https://images.unsplash.com/photo-1509021436665-8f07dbf5bf1d');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      margin-top: 60px;
    }

    .hero h2 {
      font-size: 3em;
      margin-bottom: 20px;
    }

    .btn {
      background-color: #facc15;
      padding: 12px 30px;
      border-radius: 50px;
      text-decoration: none;
      color: #000;
      font-weight: bold;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin: 40px;
    }

    .product-card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      text-align: center;
      transition: 0.3s;
    }

    .product-card:hover {
      transform: translateY(-10px);
    }

    .product-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .price {
      color: #4CAF50;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .product-card button {
      background-color: #f39c12;
      color: white;
      padding: 10px;
      width: 100%;
      border: none;
      cursor: pointer;
    }

    /* MODAL LOGIN */
    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
      animation: aparecer 0.3s;
    }

    .modal-content input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    .modal-content button {
      width: 100%;
      padding: 10px;
      background: #facc15;
      border: none;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }

    /* NOVO TEXTO CADASTRO */
    .cadastro-texto {
      font-size: 14px;
      margin: 10px 0;
    }

    .cadastro-texto a {
      color: #facc15;
      text-decoration: none;
      font-weight: 600;
    }

    .cadastro-texto a:hover {
      text-decoration: underline;
    }

    .fechar {
      float: right;
      cursor: pointer;
      font-size: 20px;
    }

    @keyframes aparecer {
      from {transform: scale(0.8); opacity: 0;}
      to {transform: scale(1); opacity: 1;}
    }

    footer {
      background: #2e2e2e;
      color: white;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1 class="logo">Live the Faith</h1>
  <nav>
    <a href="#">Início</a>
    <a href="#produtos">Produtos</a>
    <a href="#">Contato</a>
    <a href="#" onclick="abrirLogin()">Cadastro / Login</a>
  </nav>
</header>

<section class="hero">
  <h2>Vista sua fé ✨</h2>
  <a href="#produtos" class="btn">Explorar coleção</a>
</section>

<section id="produtos" class="products">
  <div class="product-card">
    <img src="camisaltf.png">
    <h3>Camisa Live the Faith</h3>
    <p>Fé que ilumina, amor que transforma.</p>
    <div class="price">R$90,00</div>
    <button>Comprar</button>
  </div>
</section>

<!-- MODAL LOGIN -->
<div id="loginModal" class="modal">
  <div class="modal-content">
    <span class="fechar" onclick="fecharLogin()">&times;</span>
    <h2>Entrar</h2>

    <input type="email" placeholder="E-mail">
    <input type="password" placeholder="Senha">

    <p class="cadastro-texto">
      Não tem uma conta? <a href="cadastro.php">Cadastre-se</a>
    </p>

    <button>Entrar</button>
  </div>
</div>

<footer>
  <p>&copy; 2026 Live the Faith</p>
</footer>

<script>
function abrirLogin() {
  document.getElementById("loginModal").style.display = "flex";
}

function fecharLogin() {
  document.getElementById("loginModal").style.display = "none";
}

window.onclick = function(e) {
  let modal = document.getElementById("loginModal");
  if (e.target == modal) {
    modal.style.display = "none";
  }
}
</script>

</body>
</html>
