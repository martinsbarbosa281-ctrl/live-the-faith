<!DOCTYPE html> 
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Live the Faith</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
  scroll-behavior: smooth;
}

body {
  background-color: #f8fafc;
  color: #333;
}

header {
  position: fixed;
  top: 0;
  width: 100%;
  background-color: #2e2e2e;
  padding: 12px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
}

.logo {
  font-size: 22px;
  font-weight: 700;
  color: #facc15;
}

nav {
  display: flex;
  align-items: center;
  gap: 20px;
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: 600;
  font-size: 14px;
}

nav a:hover {
  color: #facc15;
}

/* ÁREA DO USUÁRIO */
.user-menu {
  position: relative;
  display: flex;
  align-items: center;
  cursor: pointer;
}

.user-icon {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #2e2e2e;
  font-weight: bold;
  font-size: 14px;
  transition: 0.3s;
}

.user-icon:hover {
  transform: scale(1.05);
}

.dropdown {
  position: absolute;
  top: 50px;
  right: 0;
  background: white;
  border-radius: 10px;
  width: 180px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  opacity: 0;
  visibility: hidden;
  transform: translateY(10px);
  transition: 0.3s;
}

.user-menu:hover .dropdown {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

.dropdown a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  text-decoration: none;
  color: #333;
  font-size: 14px;
}

.dropdown a:hover {
  background: #f3f4f6;
}

/* HERO */
.hero {
  height: 80vh;
  background: linear-gradient(rgba(15,23,42,0.75), rgba(15,23,42,0.75)),
  url('https://images.unsplash.com/photo-1509021436665-8f07dbf5bf1d');
  background-size: cover;
  background-position: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
  margin-top: 60px;
}

.hero h2 {
  font-size: 3em;
  margin-bottom: 20px;
}

/* PRODUTOS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
  gap:25px;
  margin:40px;
}

.product-card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
  cursor:pointer;
}

.product-card:hover{
  transform:translateY(-5px);
}

.img-container{
  position:relative;
  background:#f3f4f6;
}

.img-container img{
  width:100%;
  height:260px;
  object-fit:contain;
}

.fav{
  position:absolute;
  top:10px;
  right:10px;
  background:white;
  width:35px;
  height:35px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.product-info{
  padding:15px;
}

.product-info h3{
  font-size:16px;
  margin-bottom:5px;
}

.categoria{
  color:#777;
  font-size:13px;
}

.price-box{
  margin-top:10px;
}

.price{
  font-weight:bold;
  font-size:16px;
}

.old-price{
  text-decoration:line-through;
  color:#999;
  margin-left:8px;
  font-size:14px;
}

.desconto{
  color:green;
  margin-left:8px;
  font-size:14px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  z-index: 2000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
}

.login-box {
  background: #fff;
  width: 320px;
  padding: 30px;
  border-radius: 14px;
  text-align: center;
  position: relative;
}

.login-box input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: 1px solid #ddd;
  border-radius: 8px;
}

.login-box button {
  width: 100%;
  padding: 12px;
  background: #facc15;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.fechar {
  position: absolute;
  right: 15px;
  top: 10px;
  font-size: 20px;
  cursor: pointer;
}

.btn-login {
  background: #facc15;
  border: none;
  padding: 6px 14px;
  border-radius: 20px;
  font-weight: 600;
  cursor: pointer;
}

/* 🔥 CADASTRO MODAL */
#cadastroModal input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: 1px solid #ddd;
  border-radius: 8px;
}

</style>
</head>

<body>

<header>
<h1 class="logo">Live the Faith</h1>

<nav>
<a href="#">Início</a>
<a href="#produtos">Produtos</a>
<a href="#">Contato</a>

<div id="areaUsuario">
<button class="btn-login" onclick="abrirLogin()">Login</button>
</div>
</nav>
</header>

<section class="hero">
<h2>Vista sua fé</h2>
</section>

<section id="produtos" class="products"></section>

<div id="loginModal" class="modal">
<div class="login-box">

<span class="fechar" onclick="fecharLogin()">X</span>

<h2>Entrar</h2>

<input id="email" placeholder="email">
<input id="senha" type="password" placeholder="senha">

<p style="margin-bottom:10px; font-size:13px;">
Não tem conta? 
<a href="#" onclick="abrirCadastro()" style="color:#facc15;">Cadastre-se</a>
</p>

<p style="margin-bottom:10px; font-size:13px;">
Esqueceu a senha? 
<a href="#" onclick="abrirRecuperarSenha()" style="color:#facc15;">Recuperar senha</a>
</p>

<button onclick="simularLogin()">Entrar</button>

</div>
</div>

<div id="cadastroModal" class="modal">
<div class="login-box">

<span class="fechar" onclick="fecharCadastro()">X</span>

<h2>Criar conta</h2>

<input id="nomeCad" placeholder="nome">
<input id="telefoneCad" placeholder="telefone">
<input id="emailCad" placeholder="email">
<input id="senhaCad" type="password" placeholder="senha">

<button onclick="cadastrar()">Cadastrar</button>

</div>
</div>

<div id="trocarSenhaModal" class="modal">
<div class="login-box">

<span class="fechar" onclick="fecharTrocarSenha()">X</span>

<h2>Trocar senha</h2>

<input id="senhaAtual" type="password" placeholder="Senha atual">
<input id="novaSenha" type="password" placeholder="Nova senha">

<button onclick="trocarSenha()">Atualizar senha</button>

</div>
</div>

<div id="recuperarModal" class="modal">
<div class="login-box">

<span class="fechar" onclick="fecharRecuperarSenha()">X</span>

<h2>Recuperar senha</h2>

<input id="emailRec" placeholder="Digite seu email">
<input id="novaSenhaRec" type="password" placeholder="Nova senha">

<button onclick="recuperarSenha()">Atualizar senha</button>

</div>
</div>

<script>

// --- FUNÇÃO DE LIMPEZA ---
function limparFormularios(modalId) {
  const inputs = document.querySelectorAll(`#${modalId} input`);
  inputs.forEach(input => {
    input.value = "";
  });
}

// --- FUNÇÕES DE CONTROLE DOS MODAIS ---

function abrirLogin(){ 
  limparFormularios("loginModal");
  document.getElementById("loginModal").style.display = "flex"; 
}
function fecharLogin(){ 
  document.getElementById("loginModal").style.display = "none";
  limparFormularios("loginModal");
}

function abrirCadastro(){
  limparFormularios("cadastroModal");
  document.getElementById("loginModal").style.display = "none";
  document.getElementById("cadastroModal").style.display = "flex";
}
function fecharCadastro(){ 
  document.getElementById("cadastroModal").style.display = "none";
  limparFormularios("cadastroModal");
}

function abrirTrocarSenha(){ 
  limparFormularios("trocarSenhaModal");
  document.getElementById("trocarSenhaModal").style.display = "flex"; 
}
function fecharTrocarSenha(){ 
  document.getElementById("trocarSenhaModal").style.display = "none";
  limparFormularios("trocarSenhaModal");
}

function abrirRecuperarSenha(){
  limparFormularios("recuperarModal");
  document.getElementById("loginModal").style.display = "none";
  document.getElementById("recuperarModal").style.display = "flex";
}
function fecharRecuperarSenha(){ 
  document.getElementById("recuperarModal").style.display = "none";
  limparFormularios("recuperarModal");
}

// --- LÓGICA DE BACKEND (FETCH) ---

function cadastrar(){
  const nome=document.getElementById("nomeCad").value;
  const telefone=document.getElementById("telefoneCad").value;
  const email=document.getElementById("emailCad").value;
  const senha=document.getElementById("senhaCad").value;

  fetch("cadastrar.php",{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:`nome=${nome}&telefone=${telefone}&email=${email}&senha=${senha}`
  })
  .then(r=>r.json())
  .then(data=>{
    if(data.status==="ok"){
      alert("Cadastro realizado com sucesso!");
      fecharCadastro();
      abrirLogin();
    }else{
      alert(data.mensagem);
    }
  });
}

function trocarSenha(){
  const senhaAtual=document.getElementById("senhaAtual").value;
  const novaSenha=document.getElementById("novaSenha").value;

  fetch("trocar_senha.php",{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:`senhaAtual=${senhaAtual}&novaSenha=${novaSenha}`
  })
  .then(r=>r.json())
  .then(data=>{
    if(data.status==="ok"){
      alert("Senha atualizada com sucesso!");
      fecharTrocarSenha();
    }else{
      alert(data.mensagem);
    }
  });
}

function recuperarSenha(){
  const email=document.getElementById("emailRec").value;
  const novaSenha=document.getElementById("novaSenhaRec").value;

  fetch("trocar_senha.php",{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:`email=${email}&novaSenha=${novaSenha}`
  })
  .then(r=>r.json())
  .then(data=>{
    if(data.status==="ok"){
      alert("Senha atualizada com sucesso!");
      fecharRecuperarSenha();
      abrirLogin();
    }else{
      alert(data.mensagem);
    }
  });
}

function simularLogin(){
  const email=document.getElementById("email").value;
  const senha=document.getElementById("senha").value;

  fetch("login.php",{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:`email=${email}&senha=${senha}`
  })
  .then(r=>r.json())
  .then(data=>{
    if(data.status==="ok"){
      localStorage.setItem("usuarioNome",data.nome);
      fecharLogin();

      if(data.admin==1){
        window.location.href="admin.html";
        return;
      }

      document.getElementById("areaUsuario").innerHTML = `
        <div class="user-menu">
          <div class="user-icon">
            ${data.nome.charAt(0).toUpperCase()}
          </div>
          <div class="dropdown">
            <a href="carrinho.html">🛒 Carrinho</a>
            <a href="favoritos.html">❤️ Favoritos</a>
            <a href="#" onclick="abrirTrocarSenha()">🔒 Trocar senha</a>
            <a href="#" onclick="logout()">🚪 Sair</a>
          </div>
        </div>
      `;
    }else{
      alert(data.mensagem);
    }
  });
}

function logout(){
  localStorage.removeItem("usuarioNome");
  location.reload();
}

window.onload=()=>{
  carregarProdutos();
}

function carregarProdutos(){
  fetch("listar.php")
  .then(r=>r.json())
  .then(produtos=>{
    let html="";
    produtos.forEach(p=>{
      html+=`
        <div class="product-card" onclick='abrirProduto(${JSON.stringify(p)})'>
          <div class="img-container">
            <img src="${p.imagem}">
            <div class="fav">♡</div>
          </div>
          <div class="product-info">
            <h3>${p.nome}</h3>
            <span class="categoria">${p.categoria || "Casual"}</span>
            <div class="price-box">
              <span class="price">R$ ${p.preco}</span>
              ${p.preco_antigo ? `<span class="old-price">R$ ${p.preco_antigo}</span>` : ""}
              ${p.desconto ? `<span class="desconto">${p.desconto}</span>` : ""}
            </div>
          </div>
        </div>
      `;
    });
    document.getElementById("produtos").innerHTML=html;
  });
}

function abrirProduto(produto){
  localStorage.setItem("produtoSelecionado", JSON.stringify(produto));
  window.location.href = "produto.html";
}

</script>

</body>
</html>
