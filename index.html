<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live the Faith</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
      scroll-behavior: smooth;
    }

    body {
      background-color: #f8fafc;
      color: #333;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      background-color: #2e2e2e;
      padding: 12px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #facc15;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }

    nav a:hover {
      color: #facc15;
    }

    .hero {
      height: 80vh;
      background: linear-gradient(rgba(15,23,42,0.75), rgba(15,23,42,0.75)),
      url('https://images.unsplash.com/photo-1509021436665-8f07dbf5bf1d');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      margin-top: 60px;
    }

    .hero h2 {
      font-size: 3em;
      margin-bottom: 20px;
    }

    .btn {
      background-color: #facc15;
      padding: 12px 30px;
      border-radius: 50px;
      text-decoration: none;
      color: #000;
      font-weight: bold;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin: 40px;
    }

    .product-card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      overflow: hidden;
      text-align: center;
      transition: 0.3s;
    }

    .product-card:hover {
      transform: translateY(-8px);
    }

    .product-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .price {
      color: #4CAF50;
      font-weight: bold;
      margin: 10px 0;
    }

    .product-card button {
      background-color: #f39c12;
      color: white;
      padding: 10px;
      width: 100%;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: #fff;
      width: 320px;
      padding: 30px;
      border-radius: 14px;
      text-align: center;
      position: relative;
    }

    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    .login-box button {
      width: 100%;
      padding: 12px;
      background: #facc15;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .fechar {
      position: absolute;
      right: 15px;
      top: 10px;
      font-size: 20px;
      cursor: pointer;
    }

    .link {
      margin-top: 10px;
      font-size: 14px;
    }

    .link a {
      color: #facc15;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h1 class="logo">Live the Faith</h1>
  <nav>
    <a href="#">Início</a>
    <a href="#produtos">Produtos</a>
    <a href="#">Contato</a>

    <span id="areaUsuario">
      <a href="#" onclick="abrirLogin()">Login</a>
    </span>
  </nav>
</header>

<section class="hero">
  <h2>Vista sua fé ✨</h2>
  <a href="#produtos" class="btn">Explorar coleção</a>
</section>

<section id="produtos" class="products">
  <div class="product-card">
    <img src="camisaltf.png">
    <h3>Camisa Live the Faith</h3>
    <p>Fé que ilumina, amor que transforma.</p>
    <div class="price">R$90,00</div>
    <button onclick="verificarCompra()">Comprar</button>
  </div>
</section>

<!-- LOGIN -->
<div id="loginModal" class="modal">
  <div class="login-box">
    <span class="fechar" onclick="fecharLogin()">&times;</span>

    <h2>Entrar</h2>

    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="simularLogin()">Entrar</button>

    <div class="link">
      Não tem conta? <a onclick="abrirCadastro()">Cadastre-se</a>
    </div>
  </div>
</div>

<!-- CADASTRO -->
<div id="cadastroModal" class="modal">
  <div class="login-box">
    <span class="fechar" onclick="fecharCadastro()">&times;</span>

    <h2>Cadastrar</h2>

    <input type="text" id="nomeCadastro" placeholder="Nome">
    <input type="tel" id="telefoneCadastro" placeholder="Telefone">
    <input type="email" id="emailCadastro" placeholder="E-mail">
    <input type="password" id="senhaCadastro" placeholder="Senha">

    <button onclick="simularCadastro()">Criar conta</button>
  </div>
</div>

<script>

let usuarioLogado = false;

function verificarCompra() {
  if(!usuarioLogado){
    abrirLogin();
    return;
  }
  alert("Compra liberada!");
}

function abrirLogin() {
  document.getElementById("loginModal").style.display = "flex";
}

function fecharLogin() {
  document.getElementById("loginModal").style.display = "none";
}

function abrirCadastro() {
  fecharLogin();
  document.getElementById("cadastroModal").style.display = "flex";
}

function fecharCadastro() {
  document.getElementById("cadastroModal").style.display = "none";
}

/* LOGIN */
function simularLogin() {

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  fetch("login.php", {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: `email=${encodeURIComponent(email)}&senha=${encodeURIComponent(senha)}`
  })
  .then(res => res.json())
  .then(data => {

    if(data.status === "ok"){
      usuarioLogado = true;
      fecharLogin();

      alert("Bem-vindo " + data.nome);

      document.getElementById("areaUsuario").innerHTML = `
        <div style="position:relative; display:inline-block; margin-left:20px;">

          <span onclick="toggleMenu()" style="color:white; font-weight:bold; cursor:pointer;">
            👤 ${data.nome}
          </span>

          <div id="menuPerfil" style="
            display:none;
            position:absolute;
            right:0;
            background:#fff;
            color:#000;
            border-radius:8px;
            padding:10px;
            margin-top:10px;
            min-width:120px;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
          ">
            <div onclick="logout()" style="cursor:pointer; padding:5px;">
               Sair
            </div>
          </div>

        </div>
      `;

    } else {
      usuarioLogado = false;
      alert(data.mensagem);
    }

  })
  .catch(() => {
    alert("Erro ao conectar com servidor");
  });

}

/* LOGOUT */
function logout() {
  usuarioLogado = false;

  alert("Você saiu da conta");

  document.getElementById("areaUsuario").innerHTML = `
    <a href="#" onclick="abrirLogin()">Login</a>
  `;
}

/* MENU PERFIL */
function toggleMenu() {
  const menu = document.getElementById("menuPerfil");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

/* CADASTRO */
function simularCadastro() {

  const nome = document.getElementById("nomeCadastro").value;
  const telefone = document.getElementById("telefoneCadastro").value;
  const email = document.getElementById("emailCadastro").value;
  const senha = document.getElementById("senhaCadastro").value;

  fetch("cadastrar.php", {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: `nome=${encodeURIComponent(nome)}&telefone=${encodeURIComponent(telefone)}&email=${encodeURIComponent(email)}&senha=${encodeURIComponent(senha)}`
  })
  .then(res => res.json())
  .then(data => {

    if(data.status === "ok"){
      alert("Conta criada com sucesso!");
      fecharCadastro();
      abrirLogin();
    } else {
      alert(data.mensagem);
    }

  })
  .catch(() => {
    alert("Erro ao cadastrar");
  });

}

/* ✅ MODAL CORRIGIDO */
window.addEventListener("click", function(e){

  const login = document.getElementById("loginModal");
  const cadastro = document.getElementById("cadastroModal");

  if(e.target === login){
    login.style.display = "none";
  }

  if(e.target === cadastro){
    cadastro.style.display = "none";
  }

  if (!e.target.closest('#menuPerfil') && !e.target.closest('#areaUsuario')) {
    const menu = document.getElementById("menuPerfil");
    if(menu) menu.style.display = "none";
  }

});

</script>

</body>
</html>
