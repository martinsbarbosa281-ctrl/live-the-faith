<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produto</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family: 'Poppins', sans-serif;
  margin:0;
  background:#f8fafc;
}

.container{
  display:flex;
  gap:50px;
  padding:120px 80px;
  align-items:flex-start;
  flex-wrap:wrap;
}

.img-box{
  position:relative;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.img-box img{
  width:350px;
  object-fit:contain;
}

/* ❤️ coração */
.fav{
  position:absolute;
  top:15px;
  right:15px;
  background:white;
  width:40px;
  height:40px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
  transition:0.2s;
  user-select:none;
}

.fav.ativo{
  color:red;
}

.info{
  max-width:400px;
}

.info h1{
  font-size:28px;
  margin-bottom:10px;
}

.preco{
  font-size:24px;
  font-weight:bold;
  margin:15px 0;
}

.estoque{
  margin:10px 0;
  font-weight:600;
  color:#444;
}

.tamanhos{
  display:flex;
  gap:10px;
  margin:20px 0;
}

.tamanho{
  padding:10px 15px;
  border:1px solid #ccc;
  cursor:pointer;
  border-radius:8px;
}

.tamanho.ativo{
  background:#000;
  color:white;
}

.botoes{
  display:flex;
  gap:15px;
  margin-top:20px;
}

button{
  padding:10px 15px;
  border:none;
  cursor:pointer;
  border-radius:8px;
  font-weight:600;
}

.btn-carrinho{
  background:#facc15;
  flex:1;
}

.btn-comprar{
  background:#000;
  color:white;
  flex:1;
}

.contador{
  margin-top:20px;
}

.contador-box{
  display:flex;
  align-items:center;
  gap:10px;
}

.contador-box button{
  width:35px;
  height:35px;
  font-size:18px;
}
</style>
</head>

<body>

<div class="container">

  <div class="img-box">
    <img id="imgProduto">

    <!-- ❤️ coração -->
    <div class="fav" id="btnFav">♡</div>
  </div>

  <div class="info">
    <h1 id="nome"></h1>
    <div class="preco" id="preco"></div>

    <div class="estoque" id="estoque"></div>

    <div id="areaTamanho">
      <p>Escolha o tamanho:</p>
      <div class="tamanhos">
        <div class="tamanho" onclick="selecionarTamanho(this,'P')">P</div>
        <div class="tamanho" onclick="selecionarTamanho(this,'M')">M</div>
        <div class="tamanho" onclick="selecionarTamanho(this,'G')">G</div>
        <div class="tamanho" onclick="selecionarTamanho(this,'GG')">GG</div>
      </div>
    </div>

    <!-- contador -->
    <div class="contador">
      <p>Quantidade:</p>
      <div class="contador-box">
        <button onclick="diminuirQtd()">-</button>
        <span id="qtd">1</span>
        <button onclick="aumentarQtd()">+</button>
      </div>
    </div>

    <div class="botoes">
      <button class="btn-carrinho" onclick="addCarrinho()">Adicionar ao carrinho</button>
      <button class="btn-comprar" onclick="comprarAgora()">Comprar agora</button>
    </div>

  </div>

</div>

<script>

let produto = JSON.parse(localStorage.getItem("produtoSelecionado"));

if(!produto){
  alert("Nenhum produto selecionado");
  window.location.href = "index.html";
}

document.getElementById("nome").innerText = produto.nome;
document.getElementById("preco").innerText = "R$ " + produto.preco;
document.getElementById("imgProduto").src = produto.imagem;

document.getElementById("estoque").innerText =
  "Estoque: " + (produto.quantidade_estoque || 0);

/* ❤️ FAVORITO (CORRIGIDO E GARANTIDO) */
document.addEventListener("DOMContentLoaded", () => {

  const btnFav = document.getElementById("btnFav");

  btnFav.addEventListener("click", () => {
    btnFav.classList.toggle("ativo");

    if(btnFav.classList.contains("ativo")){
      btnFav.innerHTML = "❤️";
    } else {
      btnFav.innerHTML = "♡";
    }
  });

});

/* tamanho */
let tamanhoSelecionado = null;

function selecionarTamanho(el, tamanho){
  tamanhoSelecionado = tamanho;
  document.querySelectorAll(".tamanho").forEach(t=>t.classList.remove("ativo"));
  el.classList.add("ativo");
}

/* contador */
let quantidadeSelecionada = 1;

function atualizarQtd(){
  document.getElementById("qtd").innerText = quantidadeSelecionada;
}

function aumentarQtd(){
  if(quantidadeSelecionada < (produto.quantidade_estoque || 0)){
    quantidadeSelecionada++;
    atualizarQtd();
  }
}

function diminuirQtd(){
  if(quantidadeSelecionada > 1){
    quantidadeSelecionada--;
    atualizarQtd();
  }
}

/* carrinho */
function addCarrinho(){

  let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

  carrinho.push({
    ...produto,
    tamanho: tamanhoSelecionado,
    quantidade: quantidadeSelecionada
  });

  localStorage.setItem("carrinho", JSON.stringify(carrinho));

  alert("Adicionado ao carrinho 🛒");
}

/* compra */
function comprarAgora(){

  localStorage.setItem("compraDireta", JSON.stringify({
    ...produto,
    quantidade: quantidadeSelecionada
  }));

  alert("Indo para pagamento...");
}

</script>

</body>
</html>
