<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Favoritos</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:Poppins;
  background:#f8fafc;
  padding:20px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
  gap:25px;
}

.product-card{
  background:white;
  border-radius:12px;
  overflow:hidden;
}

.product-card img{
  width:100%;
  height:260px;
  object-fit:contain;
}

.product-info{
  padding:15px;
}

.price{
  font-weight:bold;
  margin-top:10px;
}

button{
  width:100%;
  padding:10px;
  background:#facc15;
  border:none;
  cursor:pointer;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>❤️ Favoritos</h2>

<div id="lista" class="products"></div>

<script>
let favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];

let html="";

favoritos.forEach((p,i)=>{
html+=`
<div class="product-card">
  <img src="${p.imagem}">
  <div class="product-info">
    <h3>${p.nome}</h3>
    <div class="price">R$ ${p.preco}</div>

    <button onclick="remover(${i})">Remover</button>
  </div>
</div>`;
});

document.getElementById("lista").innerHTML=html;

function remover(i){
  favoritos.splice(i,1);
  localStorage.setItem("favoritos", JSON.stringify(favoritos));
  location.reload();
}
</script>

</body>
</html>
