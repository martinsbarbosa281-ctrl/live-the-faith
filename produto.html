<!DOCTYPE html> 
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produto</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family: 'Poppins', sans-serif;
  margin:0;
  background:#f8fafc;
}

/* CONTAINER IGUAL PADRÃO */
.container{
  display:flex;
  gap:50px;
  padding:120px 80px;
  align-items:flex-start;
  flex-wrap:wrap;
}

/* CARD IMAGEM */
.img-box{
  position:relative;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.img-box img{
  width:350px;
  object-fit:contain;
}

/* CORAÇÃO */
.fav{
  position:absolute;
  top:15px;
  right:15px;
  background:white;
  width:40px;
  height:40px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
  transition:0.2s;
}

.fav:hover{
  transform:scale(1.1);
}

/* INFO */
.info{
  max-width:400px;
}

.info h1{
  font-size:28px;
  margin-bottom:10px;
}

.preco{
  font-size:24px;
  font-weight:bold;
  margin:15px 0;
}

/* TAMANHOS */
.tamanhos{
  display:flex;
  gap:10px;
  margin:20px 0;
}

.tamanho{
  padding:10px 15px;
  border:1px solid #ccc;
  cursor:pointer;
  border-radius:8px;
  transition:0.2s;
}

.tamanho:hover{
  border-color:#000;
}

.tamanho.ativo{
  background:#000;
  color:white;
}

/* BOTÕES */
.botoes{
  display:flex;
  gap:15px;
  margin-top:20px;
}

button{
  flex:1;
  padding:15px;
  border:none;
  cursor:pointer;
  border-radius:10px;
  font-weight:600;
  transition:0.2s;
}

.btn-carrinho{
  background:#facc15;
}

.btn-carrinho:hover{
  background:#eab308;
}

.btn-comprar{
  background:#000;
  color:white;
}

.btn-comprar:hover{
  background:#111;
}
</style>
</head>

<body>

<div class="container">
  
  <div class="img-box">
    <img id="imgProduto">
    <div class="fav" id="btnFav" onclick="toggleFavorito()">♡</div>
  </div>

  <div class="info">
    <h1 id="nome"></h1>
    <div class="preco" id="preco"></div>

    <!-- Tamanhos (vai sumir se NÃO for roupa) -->
    <div id="areaTamanho">
      <p>Escolha o tamanho:</p>

      <div class="tamanhos">
        <div class="tamanho" onclick="selecionarTamanho(this,'P')">P</div>
        <div class="tamanho" onclick="selecionarTamanho(this,'M')">M</div>
        <div class="tamanho" onclick="selecionarTamanho(this,'G')">G</div>
        <div class="tamanho" onclick="selecionarTamanho(this,'GG')">GG</div>
      </div>
    </div>

    <div class="botoes">
      <button class="btn-carrinho" onclick="addCarrinho()">Adicionar ao carrinho</button>
      <button class="btn-comprar" onclick="comprarAgora()">Comprar agora</button>
    </div>
  </div>

</div>

<script>

/* PRODUTO */
let produto = JSON.parse(localStorage.getItem("produtoSelecionado"));

if(!produto){
  alert("Nenhum produto selecionado");
  window.location.href = "index.html";
}

/* MOSTRAR */
document.getElementById("nome").innerText = produto.nome;
document.getElementById("preco").innerText = "R$ " + produto.preco;
document.getElementById("imgProduto").src = produto.imagem;

/* ESCONDER TAMANHO SE NÃO FOR ROUPA */
if(produto.categoria !== "roupa"){
  document.getElementById("areaTamanho").style.display = "none";
}

let tamanhoSelecionado = null;

/* TAMANHO */
function selecionarTamanho(el, tamanho){
  tamanhoSelecionado = tamanho;

  document.querySelectorAll(".tamanho").forEach(t=>{
    t.classList.remove("ativo");
  });

  el.classList.add("ativo");
}

/* FAVORITOS */
function toggleFavorito(){
  let favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];

  const index = favoritos.findIndex(p => p.nome === produto.nome);
  const btn = document.getElementById("btnFav");

  if(index >= 0){
    favoritos.splice(index,1);
    btn.innerHTML = "♡";
    btn.style.color = "#000";
  }else{
    favoritos.push(produto);
    btn.innerHTML = "❤️";
    btn.style.color = "red";
  }

  localStorage.setItem("favoritos", JSON.stringify(favoritos));
}

/* MARCAR FAVORITO */
window.onload = () => {
  let favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];
  const isFav = favoritos.some(p => p.nome === produto.nome);

  if(isFav){
    document.getElementById("btnFav").innerHTML = "❤️";
    document.getElementById("btnFav").style.color = "red";
  }
};

/* CARRINHO */
function addCarrinho(){

  const usuario = localStorage.getItem("usuarioNome");

  if(!usuario){
    alert("Você precisa estar logado");
    window.location.href = "index.html";
    return;
  }

  if(produto.categoria === "roupa" && !tamanhoSelecionado){
    alert("Selecione um tamanho");
    return;
  }

  let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

  carrinho.push({
    ...produto,
    tamanho: produto.categoria === "roupa" ? tamanhoSelecionado : null
  });

  localStorage.setItem("carrinho", JSON.stringify(carrinho));

  alert("Adicionado ao carrinho 🛒");
}

/* COMPRAR */
function comprarAgora(){

  const usuario = localStorage.getItem("usuarioNome");

  if(!usuario){
    alert("Você precisa estar logado");
    window.location.href = "index.html";
    return;
  }

  if(produto.categoria === "roupa" && !tamanhoSelecionado){
    alert("Selecione um tamanho");
    return;
  }

  localStorage.setItem("compraDireta", JSON.stringify({
    ...produto,
    tamanho: produto.categoria === "roupa" ? tamanhoSelecionado : null
  }));

  alert("Indo para pagamento...");
}

</script>

</body>
</html>
