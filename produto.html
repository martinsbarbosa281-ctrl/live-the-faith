<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalhes do Produto - Live the Faith</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family: 'Poppins', sans-serif;
  margin:0;
  background:#fff;
  color:#111;
}

/* HEADER */
.header{
  padding:20px 60px;
  border-bottom:1px solid #eee;
  font-weight:700;
  font-size:20px;
  text-align:center;
}

/* layout */
.container{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:80px;
  padding:60px;
}

/* imagem */
.img-box{
  background:#f6f6f6;
  padding:40px;
  border-radius:10px;
  position:relative;
  height: 450px; /* Definido para segurar o tamanho das imagens absolutas */
}

/* 🔥 Alterado para permitir a sobreposição das fotos frente/costas */
.img-box img{
  width:100%;
  max-width:500px;
  height: 100%;
  object-fit: contain;
  display:block;
  margin:auto;
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  transition: 0.4s ease;
}

/* 🔥 Faz a imagem ativa aparecer */
.img-box img.active {
  opacity: 1;
}

/* 🔥 Estilização das setas de navegação */
.seta {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.4);
  color: white;
  border: none;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  transition: background 0.2s;
}

.seta:hover {
  background: rgba(0,0,0,0.7);
}

.prev { left: 15px; }
.next { right: 15px; }

/* favorito */
.fav{
  position:absolute;
  top:15px;
  right:15px;
  background:white;
  width:40px;
  height:40px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:20px;
  z-index: 11; /* Fica acima das setas */
}

.fav.ativo{
  color:red;
}

/* info */
.info h1{
  font-size:32px;
}

.preco{
  font-size:26px;
  font-weight:700;
  margin:10px 0 20px;
}

.estoque{
  color:#666;
  margin-bottom:15px;
}

/* tamanhos */
.tamanhos{
  display:flex;
  gap:10px;
  margin:15px 0;
}

.tamanho{
  border:1px solid #ccc;
  padding:10px 14px;
  cursor:pointer;
  border-radius:6px;
}

.tamanho.active{ /* 🔥 Mudado de .ativo para .active para manter padrão */
  border:2px solid #000;
  font-weight:600;
}

/* quantidade */
.contador{
  margin:20px 0;
}

.contador-box{
  display:flex;
  align-items:center;
  gap:10px;
}

.contador-box button{
  width:35px;
  height:35px;
  font-size:18px;
  border:none;
  background:#eee;
  cursor:pointer;
}

/* botões */
.botoes{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.btn-comprar{
  background:#000;
  color:#fff;
  padding:14px;
  border:none;
  font-weight:600;
  cursor:pointer;
}

.btn-carrinho{
  background:#FFD600; /* amarelo */
  color:#111;
  padding:14px;
  border:none;
  cursor:pointer;
  font-weight:600;
}

/* frete */
.frete{
  margin-top:20px;
  border-top:1px solid #eee;
  padding-top:20px;
}

.frete input{
  padding:10px;
  width:60%;
  border:1px solid #ccc;
  border-radius:6px;
}

.frete button{
  padding:10px;
  background:#000;
  color:white;
  border:none;
  cursor:pointer;
  border-radius:6px;
}

/* descrição */
.descricao{
  padding:60px;
  max-width:800px;
}

/* relacionados */
.relacionados{
  padding:60px;
}

.grid-produtos{
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:30px;
}

.card img{
  width:100%;
  background:#f6f6f6;
  padding:20px;
}

.card{
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">Live the Faith</div>

<div class="container">

  <div class="img-box">
    <img id="imgProdutoFrente" class="active">
    <img id="imgProdutoCostas">
    
    <button class="seta prev" onclick="trocarImagem()">&#10094;</button>
    <button class="seta next" onclick="trocarImagem()">&#10095;</button>
    
    <div class="fav" id="btnFav">♡</div>
  </div>

  <div class="info">
    <h1 id="nome"></h1>
    <div class="preco" id="preco"></div>
    <div class="estoque" id="estoque"></div>

    <p>Escolha o tamanho:</p>
    <div class="tamanhos">
      <div class="tamanho" onclick="selecionarTamanho(this,'P')">P</div>
      <div class="tamanho" onclick="selecionarTamanho(this,'M')">M</div>
      <div class="tamanho" onclick="selecionarTamanho(this,'G')">G</div>
      <div class="tamanho" onclick="selecionarTamanho(this,'GG')">GG</div>
    </div>

    <div class="contador">
      <p>Quantidade:</p>
      <div class="contador-box">
        <button onclick="diminuirQtd()">-</button>
        <span id="qtd">1</span>
        <button onclick="aumentarQtd()">+</button>
      </div>
    </div>

    <div class="botoes">
      <button class="btn-comprar" onclick="comprarAgora()">Comprar agora</button>
      <button class="btn-carrinho" onclick="addCarrinho()">Adicionar ao carrinho</button>
    </div>

    <div class="frete">
      <p><strong>Calcular frete</strong></p>
      <input placeholder="00000-000">
      <button>Calcular</button>
    </div>

  </div>

</div>

<div class="descricao">
  <h2>Descrição</h2>
  <p id="descricaoProduto"></p>
</div>

<div class="relacionados">
  <h2>Mais Vendidos</h2>
  <div class="grid-produtos" id="produtosRelacionados"></div>
</div>

<script>
// Pega o produto real clicado vindo do localStorage
let produto = JSON.parse(localStorage.getItem("produtoSelecionated")) || JSON.parse(localStorage.getItem("produtoSelecionado"));

if (!produto) {
  alert("Nenhum produto selecionado!");
  window.location.href = "index.html";
}

// Render do produto principal com dados do Banco de Dados
document.getElementById("nome").innerText = produto.nome;
document.getElementById("preco").innerText = "R$ " + produto.preco;
document.getElementById("imgProdutoFrente").src = produto.imagem;
// Caso não tenha foto das costas cadastrada, repete a da frente por segurança
document.getElementById("imgProdutoCostas").src = produto.imagem_costas || produto.imagem; 
document.getElementById("estoque").innerText = "Estoque: " + (produto.quantidade_estoque || 0);
document.getElementById("descricaoProduto").innerText = produto.descricao;

// 🔥 Função simples para trocar a foto de frente/costas nesta tela
function trocarImagem() {
    const frente = document.getElementById("imgProdutoFrente");
    const costas = document.getElementById("imgProdutoCostas");
    
    if(frente.classList.contains("active")) {
        frente.classList.remove("active");
        costas.classList.add("active");
    } else {
        costas.classList.remove("active");
        frente.classList.add("active");
    }
}

// Favorito
const favBtn = document.getElementById("btnFav");
const favKey = "fav_" + produto.id;
if(localStorage.getItem(favKey) === "true"){
  favBtn.classList.add("ativo");
  favBtn.innerHTML = "❤️";
}
favBtn.onclick = () => {
  const ativo = favBtn.classList.toggle("ativo");
  favBtn.innerHTML = ativo ? "❤️" : "♡";
  localStorage.setItem(favKey, ativo);
};

// Tamanho
let tamanhoSelecionado = null;
function selecionarTamanho(el, t){
  tamanhoSelecionado = t;
  document.querySelectorAll(".tamanho").forEach(x => x.classList.remove("active"));
  el.classList.add("active");
}

// Quantidade
let quantidadeSelecionada = 1;
function atualizarQtd(){ document.getElementById("qtd").innerText = quantidadeSelecionada; }
function aumentarQtd(){ if(quantidadeSelecionada < produto.quantidade_estoque){ quantidadeSelecionada++; atualizarQtd(); } }
function diminuirQtd(){ if(quantidadeSelecionada > 1){ quantidadeSelecionada--; atualizarQtd(); } }

// Carrinho
function addCarrinho(){
  let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
  carrinho.push({...produto, tamanho: tamanhoSelecionado, quantidade: quantidadeSelecionada});
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
  alert("Adicionado ao carrinho 🛒");
}

// Comprar agora
function comprarAgora(){
  window.location.href = "pagina_pagamento.html";
}

// Render dinâmico de produtos relacionados vindo do seu listar.php real
fetch("listar.php")
  .then(r => r.json())
  .then(listaProdutos => {
      const containerRelacionados = document.getElementById("produtosRelacionados");
      // Filtra para não mostrar o próprio produto que já está aberto na tela
      const filtrados = listaProdutos.filter(p => p.id !== produto.id);
      
      // Pega no máximo 3 itens para exibir
      filtrados.slice(0, 3).forEach(p => {
        const div = document.createElement("div");
        div.className = "card";
        div.onclick = () => {
            localStorage.setItem("produtoSelecionado", JSON.stringify(p));
            window.location.reload();
        };
        div.innerHTML = `<img src="${p.imagem}"><p>${p.nome}</p><strong>R$ ${p.preco}</strong>`;
        containerRelacionados.appendChild(div);
      });
  })
  .catch(err => console.error("Erro ao carregar relacionados:", err));
</script>

</body>
</html>
